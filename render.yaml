services:
  - type: web
    name: telegram-file-bot
    runtime: python
    repo: https://github.com/sizin-kullanici-adi/telegram-bot
    plan: free
    envVars:
      - key: TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: LOG_CHANNEL
        sync: false
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
